name: Verify Benchmark Artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  public-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make run_bench.sh executable
        run: chmod +x run_bench.sh

      - name: Run public verification harness
        run: ./run_bench.sh

      - name: Confirm RESULTS.md + suite
        run: |
          grep -q "TRADE CUDA" RESULTS.md
          grep -q "WNSM free-ride" RESULTS.md
          grep -q "Long-context" RESULTS.md
          grep -q "0ae659948eabc3fa" RESULTS.md
          test -f suite/manifest.json
          test -f frozen/h100_trade_cuda_20260711.json
          test -f frozen/h100_longctx_scaling_20260711.json
          echo "RESULTS.md + suite OK"
